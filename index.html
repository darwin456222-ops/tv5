<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profesyonel Ritim Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Mobil tarayıcı kaydırmasını tamamen kilitler */
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        input[type="file"] {
            background: #00adb5;
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #status-text {
            margin-top: 10px;
            font-size: 16px;
            color: #eeeeee;
        }
        #score-display {
            font-size: 28px;
            font-weight: bold;
            color: #f8b500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: none;
        }
        canvas {
            display: block;
        }
        #buttons-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.7);
            border-top: 3px solid rgba(255, 255, 255, 0.2);
        }
        .hit-btn {
            flex: 1;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.1);
            border-left: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(255, 255, 255, 0.05);
            font-size: 24px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.1s;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <input type="file" id="audio-upload" accept="audio/mp3, audio/wav, audio/mpeg">
        <div id="status-text">Lütfen bir müzik dosyası seçin...</div>
        <div id="score-display">Puan: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="buttons-container">
        <div class="hit-btn" id="btn-0">SOL</div>
        <div class="hit-btn" id="btn-1">ORTA</div>
        <div class="hit-btn" id="btn-2">SAĞ</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('audio-upload');
        const statusText = document.getElementById('status-text');
        const scoreDisplay = document.getElementById('score-display');
        
        let width = window.innerWidth;
        let height = window.innerHeight - 120; 
        canvas.width = width;
        canvas.height = height;

        const laneWidth = width / 3;
        const hitZoneY = height - 50; 
        const spawnY = -50; // Notaların doğduğu yükseklik
        
        // OYUN AYARLARI
        const travelTime = 1.5; // Bir notanın ekrandan hedef çizgiye düşme süresi (Saniye)
        const hitWindow = 0.2; // Nota çizgiye +- 0.2 saniye yakınken basılırsa geçerli sayılır
        
        let score = 0;
        let beatmap = []; // Şarkının tüm notalarını (saniyelerini) tutacak harita
        let gameRunning = false;

        let audioCtx, audioSource, startTime;

        // 1. MP3 Yükleme ve Analiz Süreci
        upload.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            upload.style.display = 'none'; 
            statusText.innerText = "Şarkı analiz ediliyor, harita çıkarılıyor...";

            const arrayBuffer = await file.arrayBuffer();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Şarkıyı milisaniyeler içinde deşifre et (Ses verisini al)
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            // Şarkının dalgalarından otomatik harita (Beatmap) oluştur
            generateBeatmap(audioBuffer);

            statusText.style.display = 'none';
            scoreDisplay.style.display = 'block';

            // Oyunu başlat
            startGame(audioBuffer);
        });

        // 2. Geleceği Görme: Şarkı Çalmadan Önce Harita Çıkarma
        function generateBeatmap(buffer) {
            // Sadece tek kanalı (Mono) okumak ritim bulmak için yeterlidir
            const channelData = buffer.getChannelData(0); 
            const sampleRate = buffer.sampleRate;
            
            const threshold = 0.4; // Ses eşiği (0 ile 1 arası). Çok sessiz şarkılar için düşürülebilir.
            let lastBeatTime = 0;

            for (let i = 0; i < channelData.length; i++) {
                // Eğer ses dalgası belli bir şiddeti aşıyorsa bu bir "vuruş" (beat) olabilir
                if (Math.abs(channelData[i]) > threshold) {
                    const timeInSeconds = i / sampleRate;
                    
                    // İki nota arası en az 0.25 saniye olsun (Saniyede max 4 nota, oynaması keyifli olur)
                    if (timeInSeconds - lastBeatTime > 0.25) {
                        beatmap.push({
                            time: timeInSeconds, // Şarkının tam olarak kaçıncı saniyesinde?
                            lane: Math.floor(Math.random() * 3), // Hangi şerit?
                            hit: false, // Vuruldu mu?
                            missed: false // Kaçırıldı mı?
                        });
                        lastBeatTime = timeInSeconds;
                    }
                }
            }
        }

        // 3. Oyunu Başlat
        function startGame(buffer) {
            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = buffer;
            audioSource.connect(audioCtx.destination);
            
            // Müziği oynat ve oyunun başladığı tam saniyeyi kaydet
            audioSource.start(0);
            startTime = audioCtx.currentTime;
            gameRunning = true;
            
            requestAnimationFrame(gameLoop);
        }

        // 4. Dokunmatik Kontroller
        const hitButtons = [
            document.getElementById('btn-0'),
            document.getElementById('btn-1'),
            document.getElementById('btn-2')
        ];

        hitButtons.forEach((btn, index) => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                checkHit(index);
            });
            btn.addEventListener('mousedown', () => checkHit(index));
        });

        function checkHit(laneIndex) {
            // Şu anki oyun süresini hesapla
            const currentTime = audioCtx.currentTime - startTime;

            // Dokunulan şeritteki, henüz vurulmamış ve kaçırılmamış ilk notayı bul
            for (let i = 0; i < beatmap.length; i++) {
                let note = beatmap[i];
                if (note.lane === laneIndex && !note.hit && !note.missed) {
                    
                    // Nota basılma süresine ne kadar yakın? (Zaman farkı)
                    let timeDifference = Math.abs(note.time - currentTime);

                    if (timeDifference < hitWindow) {
                        // Vuruş başarılı!
                        note.hit = true;
                        score += 10;
                        
                        // Tam zamanında (Mükemmel) vurulduysa ekstra puan
                        if (timeDifference < 0.05) score += 5; 

                        scoreDisplay.innerText = `Puan: ${score}`;
                        
                        // Buton parlama efekti
                        hitButtons[laneIndex].style.backgroundColor = "rgba(0, 173, 181, 0.8)";
                        setTimeout(() => {
                            hitButtons[laneIndex].style.backgroundColor = "rgba(255, 255, 255, 0.05)";
                        }, 100);
                    }
                    break; // Sadece o anki hedefe en yakın notayı kontrol et
                }
            }
        }

        // 5. Oyun Döngüsü (Ekrana Çizim)
        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            // Ekranı temizle
            ctx.clearRect(0, 0, width, height);

            // Şuan şarkının kaçıncı saniyesindeyiz?
            const currentTime = audioCtx.currentTime - startTime;

            // Hedef çizgisini çiz
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, hitZoneY - 15, width, 30);
            ctx.strokeStyle = "#00adb5";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, hitZoneY); ctx.lineTo(width, hitZoneY);
            ctx.stroke();

            // Şerit ayırıcı çizgileri çiz
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(laneWidth, 0); ctx.lineTo(laneWidth, height);
            ctx.moveTo(laneWidth * 2, 0); ctx.lineTo(laneWidth * 2, height);
            ctx.stroke();

            // Saniyedeki Piksel Hızı hesaplaması
            const pixelsPerSecond = (hitZoneY - spawnY) / travelTime;

            // Haritadaki tüm notaları kontrol et
            for (let i = 0; i < beatmap.length; i++) {
                let note = beatmap[i];

                // Eğer nota vurulduysa veya kaçırıldıysa çizme
                if (note.hit) continue;

                // Nota ekran dışına çıktıysa ve vurulmadıysa 'kaçırıldı' işaretle
                if (currentTime > note.time + hitWindow) {
                    note.missed = true;
                    continue;
                }

                // Ekranda gösterilecek olan notaları çiz
                // Mantık: (Nota zamanı - Şuan) bize notanın hedefe ulaşmasına kaç saniye kaldığını verir
                let timeUntilHit = note.time - currentTime;

                // Eğer hedefe varma süresi, belirlenen travelTime'dan küçükse nota ekranda demektir
                if (timeUntilHit <= travelTime && timeUntilHit > -hitWindow) {
                    
                    // Notanın Y koordinatını hesapla (Saniye * Hız formülü)
                    let currentY = hitZoneY - (timeUntilHit * pixelsPerSecond);
                    let xPos = note.lane * laneWidth + (laneWidth / 2);

                    // Notayı Ekrana Çiz
                    ctx.beginPath();
                    ctx.arc(xPos, currentY, laneWidth * 0.25, 0, Math.PI * 2);
                    ctx.fillStyle = "#eeeeee"; 
                    ctx.fill();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = "#00adb5"; 
                    ctx.stroke();
                }
            }
        }
        
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight - 120;
            canvas.width = width;
            canvas.height = height;
        });
    </script>
</body>
</html>
