<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kendi Müziğinle Ritim Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Metin seçimini engeller */
        }
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* Kaydırmayı engeller */
            touch-action: none; /* Mobil tarayıcı kaydırmasını engeller */
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        input[type="file"] {
            background: #e94560;
            color: white;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }
        #score-display {
            font-size: 24px;
            font-weight: bold;
            color: #fca311;
        }
        canvas {
            display: block;
        }
        #buttons-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.5);
            border-top: 2px solid #fff;
        }
        .hit-btn {
            flex: 1;
            height: 100%;
            border: 1px solid #333;
            background-color: rgba(255, 255, 255, 0.1);
            font-size: 30px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hit-btn:active {
            background-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <input type="file" id="audio-upload" accept="audio/mp3, audio/wav">
        <div id="score-display">Puan: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="buttons-container">
        <div class="hit-btn" id="btn-0">SOL</div>
        <div class="hit-btn" id="btn-1">ORTA</div>
        <div class="hit-btn" id="btn-2">SAĞ</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('audio-upload');
        const scoreDisplay = document.getElementById('score-display');
        
        let width = window.innerWidth;
        let height = window.innerHeight - 120; // Alt butonlar için alan bırak
        canvas.width = width;
        canvas.height = height;

        const laneWidth = width / 3;
        const hitZoneY = height - 50; // Notaların vurulması gereken hedef çizgisi
        const noteSpeed = 5; 
        
        let score = 0;
        let notes = [];
        let gameRunning = false;

        // Ses API Değişkenleri
        let audioCtx, analyser, source;
        let dataArray;
        let lastSpawnTime = 0;

        // MP3 Yüklendiğinde
        upload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Dosyayı okuyup çalmak için URL oluştur
            const audioUrl = URL.createObjectURL(file);
            const audio = new Audio(audioUrl);
            audio.crossOrigin = "anonymous";

            // Web Audio API Kurulumu
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            audio.play();
            gameRunning = true;
            upload.style.display = 'none'; // Oyunu başlatınca yükle butonunu gizle
            
            gameLoop();
        });

        // Oyuncu Butonlara Bastığında (Dokunmatik ekran için touchstart)
        const hitButtons = [
            document.getElementById('btn-0'),
            document.getElementById('btn-1'),
            document.getElementById('btn-2')
        ];

        hitButtons.forEach((btn, index) => {
            // Hem telefonda dokunma hem bilgisayarda fare tıklaması için
            btn.addEventListener('touchstart', () => checkHit(index));
            btn.addEventListener('mousedown', () => checkHit(index));
        });

        // Nota Vurma Kontrolü
        function checkHit(laneIndex) {
            // İlgili şeritteki ve vurma bölgesindeki (hit zone) en yakın notayı bul
            const hitMargin = 80; // Vurma toleransı
            
            for (let i = 0; i < notes.length; i++) {
                let note = notes[i];
                if (note.lane === laneIndex && Math.abs(note.y - hitZoneY) < hitMargin) {
                    // Nota başarıyla vuruldu!
                    score += 10;
                    scoreDisplay.innerText = `Puan: ${score}`;
                    notes.splice(i, 1); // Notayı ekrandan sil
                    
                    // Butona basıldığında anlık görsel efekt (parlama)
                    hitButtons[laneIndex].style.backgroundColor = "rgba(233, 69, 96, 0.8)";
                    setTimeout(() => {
                        hitButtons[laneIndex].style.backgroundColor = "rgba(255, 255, 255, 0.1)";
                    }, 100);
                    
                    break;
                }
            }
        }

        // Oyun Döngüsü
        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            ctx.clearRect(0, 0, width, height);

            // Hedef çizgisini çiz
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            ctx.fillRect(0, hitZoneY - 20, width, 40);

            // Şerit çizgilerini çiz
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.beginPath();
            ctx.moveTo(laneWidth, 0); ctx.lineTo(laneWidth, height);
            ctx.moveTo(laneWidth * 2, 0); ctx.lineTo(laneWidth * 2, height);
            ctx.stroke();

            // Müziği analiz et ve nota üret
            analyser.getByteFrequencyData(dataArray);
            
            // Bas (düşük frekans) vuruşlarını kontrol et
            let bassSum = 0;
            for (let i = 0; i < 10; i++) {
                bassSum += dataArray[i];
            }
            let bassAverage = bassSum / 10;

            // Eğer bas kuvvetliyse ve son notadan bu yana belli bir süre geçtiyse yeni nota oluştur
            const now = Date.now();
            if (bassAverage > 200 && now - lastSpawnTime > 300) { 
                const randomLane = Math.floor(Math.random() * 3); // 0, 1 veya 2
                notes.push({ x: randomLane * laneWidth + (laneWidth / 2), y: -50, lane: randomLane });
                lastSpawnTime = now;
            }

            // Notaları hareket ettir ve çiz
            for (let i = notes.length - 1; i >= 0; i--) {
                let note = notes[i];
                note.y += noteSpeed;

                // Notayı çiz (Daire şeklinde)
                ctx.beginPath();
                ctx.arc(note.x, note.y, laneWidth * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = "#0f3460"; // Lacivert iç
                ctx.fill();
                ctx.lineWidth = 5;
                ctx.strokeStyle = "#e94560"; // Pembe/Kırmızı çerçeve
                ctx.stroke();

                // Nota ekranın altına düşerse (vurulamazsa) diziden sil
                if (note.y > height + 50) {
                    notes.splice(i, 1);
                }
            }
        }
        
        // Cihaz yan çevrilirse ekranı güncelle
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight - 120;
            canvas.width = width;
            canvas.height = height;
        });
    </script>
</body>
</html>
