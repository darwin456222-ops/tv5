<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profesyonel Ritim Oyunu - Bas Algılamalı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Metin seçimini engeller */
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Kaydırmayı kilitler */
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        input[type="file"] {
            background: #00adb5;
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #status-text {
            margin-top: 10px;
            font-size: 16px;
            color: #eeeeee;
        }
        #score-display {
            font-size: 28px;
            font-weight: bold;
            color: #f8b500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: none;
        }
        canvas {
            display: block;
        }
        #buttons-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.7);
            border-top: 3px solid rgba(255, 255, 255, 0.2);
        }
        .hit-btn {
            flex: 1;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.1);
            border-left: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(255, 255, 255, 0.05);
            font-size: 24px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.1s;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <input type="file" id="audio-upload" accept="audio/mp3, audio/wav, audio/mpeg">
        <div id="status-text">Lütfen bir müzik dosyası seçin...</div>
        <div id="score-display">Puan: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="buttons-container">
        <div class="hit-btn" id="btn-0">SOL</div>
        <div class="hit-btn" id="btn-1">ORTA</div>
        <div class="hit-btn" id="btn-2">SAĞ</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('audio-upload');
        const statusText = document.getElementById('status-text');
        const scoreDisplay = document.getElementById('score-display');
        
        let width = window.innerWidth;
        let height = window.innerHeight - 120; 
        canvas.width = width;
        canvas.height = height;

        const laneWidth = width / 3;
        const hitZoneY = height - 50; 
        const spawnY = -50; 
        
        // --- OYUN AYARLARI ---
        const travelTime = 1.5; // Notanın düşme süresi (Saniye)
        const hitWindow = 0.2; // Geçerli vuruş toleransı (+- saniye)
        const OFFSET = 0.15; // GECİKME AYARI: Cihazına göre notaları müzikle senkronize etmek için değiştir.
        // ---------------------
        
        let score = 0;
        let beatmap = []; 
        let gameRunning = false;

        let audioCtx, audioSource, startTime;

        // MP3 Yükleme ve Analiz
        upload.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            upload.style.display = 'none'; 
            statusText.innerText = "Şarkının bas ve davulları ayrıştırılıyor... Lütfen bekleyin.";

            const arrayBuffer = await file.arrayBuffer();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            // Filtreli haritayı oluştur (async olduğu için await ile bekliyoruz)
            await generateBeatmap(audioBuffer);

            statusText.style.display = 'none';
            scoreDisplay.style.display = 'block';

            startGame(audioBuffer);
        });

        // Gelişmiş Haritalandırma (Low-Pass Filter ile Sadece Basları Algılama)
        async function generateBeatmap(originalBuffer) {
            // Arka plan işleyicisi oluştur
            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(
                1, 
                originalBuffer.length, 
                originalBuffer.sampleRate
            );

            const source = offlineCtx.createBufferSource();
            source.buffer = originalBuffer;

            // FİLTRE: İnce sesleri sil, sadece kalın (150Hz altı) bas sesleri bırak
            const filter = offlineCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.value = 150; 

            source.connect(filter);
            filter.connect(offlineCtx.destination);
            source.start(0);

            // Filtrelenmiş sesi hesapla
            const filteredBuffer = await offlineCtx.startRendering();
            const channelData = filteredBuffer.getChannelData(0);
            const sampleRate = filteredBuffer.sampleRate;

            const blockSize = Math.floor(sampleRate * 0.05); 
            const threshold = 0.5; // Hassasiyet (Şarkıya göre 0.4 - 0.7 arası idealdir)
            let lastBeatTime = 0;

            for (let i = 0; i < channelData.length; i += blockSize) {
                let maxInBlock = 0;
                
                for(let j = 0; j < blockSize && (i + j) < channelData.length; j++) {
                    let volume = Math.abs(channelData[i + j]);
                    if(volume > maxInBlock) {
                        maxInBlock = volume;
                    }
                }
                
                // Bas gücü eşiği aşıyorsa nota üret
                if (maxInBlock > threshold) {
                    const timeInSeconds = i / sampleRate;
                    
                    if (timeInSeconds - lastBeatTime > 0.3) { 
                        beatmap.push({
                            time: timeInSeconds,
                            lane: Math.floor(Math.random() * 3), 
                            hit: false, 
                            missed: false 
                        });
                        lastBeatTime = timeInSeconds;
                    }
                }
            }
        }

        // Oyunu Başlat
        function startGame(buffer) {
            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = buffer;
            audioSource.connect(audioCtx.destination);
            
            audioSource.start(0);
            startTime = audioCtx.currentTime;
            gameRunning = true;
            
            requestAnimationFrame(gameLoop);
        }

        // Dokunmatik Kontroller
        const hitButtons = [
            document.getElementById('btn-0'),
            document.getElementById('btn-1'),
            document.getElementById('btn-2')
        ];

        hitButtons.forEach((btn, index) => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                checkHit(index);
            });
            btn.addEventListener('mousedown', () => checkHit(index));
        });

        // Vuruş Kontrolü
        function checkHit(laneIndex) {
            // OFFSET dahil edilmiş gerçek zaman hesabı
            const currentTime = audioCtx.currentTime - startTime - OFFSET;

            for (let i = 0; i < beatmap.length; i++) {
                let note = beatmap[i];
                if (note.lane === laneIndex && !note.hit && !note.missed) {
                    
                    let timeDifference = Math.abs(note.time - currentTime);

                    if (timeDifference < hitWindow) {
                        note.hit = true;
                        score += 10;
                        
                        if (timeDifference < 0.05) score += 5; // Mükemmel vuruş

                        scoreDisplay.innerText = `Puan: ${score}`;
                        
                        hitButtons[laneIndex].style.backgroundColor = "rgba(0, 173, 181, 0.8)";
                        setTimeout(() => {
                            hitButtons[laneIndex].style.backgroundColor = "rgba(255, 255, 255, 0.05)";
                        }, 100);
                    }
                    break;
                }
            }
        }

        // Oyun Döngüsü
        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            ctx.clearRect(0, 0, width, height);

            // OFFSET dahil edilmiş gerçek zaman hesabı
            const currentTime = audioCtx.currentTime - startTime - OFFSET;

            // Hedef çizgisi
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, hitZoneY - 15, width, 30);
            ctx.strokeStyle = "#00adb5";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, hitZoneY); ctx.lineTo(width, hitZoneY);
            ctx.stroke();

            // Şerit çizgileri
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(laneWidth, 0); ctx.lineTo(laneWidth, height);
            ctx.moveTo(laneWidth * 2, 0); ctx.lineTo(laneWidth * 2, height);
            ctx.stroke();

            const pixelsPerSecond = (hitZoneY - spawnY) / travelTime;

            for (let i = 0; i < beatmap.length; i++) {
                let note = beatmap[i];

                if (note.hit) continue;

                if (currentTime > note.time + hitWindow) {
                    note.missed = true;
                    continue;
                }

                let timeUntilHit = note.time - currentTime;

                if (timeUntilHit <= travelTime && timeUntilHit > -hitWindow) {
                    
                    let currentY = hitZoneY - (timeUntilHit * pixelsPerSecond);
                    let xPos = note.lane * laneWidth + (laneWidth / 2);

                    ctx.beginPath();
                    ctx.arc(xPos, currentY, laneWidth * 0.25, 0, Math.PI * 2);
                    ctx.fillStyle = "#eeeeee"; 
                    ctx.fill();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = "#00adb5"; 
                    ctx.stroke();
                }
            }
        }
        
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight - 120;
            canvas.width = width;
            canvas.height = height;
        });
    </script>
</body>
</html>
